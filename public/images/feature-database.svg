  <circle cx="34" cy="16" r="5" fill="#555"/>
  <circle cx="50" cy="16" r="5" fill="#555"/>
  <rect x="200" y="10" width="200" height="12" rx="6" fill="#151515"/>

  <!-- Table header -->
