  <text x="260" y="280" font-family="monospace" font-size="12" fill="#e5e5e5"> status = 'active'</text>
  <text x="40" y="302" font-family="Inter, sans-serif" font-size="11" fill="#555">4 rows returned in 0.023s</text>
