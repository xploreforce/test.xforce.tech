<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="400" rx="12" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="32" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#e5e5e5">Server Overview</text>

  <!-- Server cards -->
  <rect x="24" y="60" width="452" height="64" rx="8" fill="#111"/>
  <circle cx="56" cy="92" r="16" fill="#E53935" opacity="0.15"/>
  <text x="49" y="97" font-family="Inter, sans-serif" font-size="14" fill="#E53935">S1</text>
  <text x="88" y="84" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e5e5e5">Production Server</text>
  <text x="88" y="104" font-family="Inter, sans-serif" font-size="11" fill="#a6a6a6">192.168.1.100 À Ubuntu 22.04</text>
  <circle cx="440" cy="92" r="5" fill="#4caf50"/>

  <rect x="24" y="136" width="452" height="64" rx="8" fill="#111"/>
  <circle cx="56" cy="168" r="16" fill="#2196f3" opacity="0.15"/>
  <text x="49" y="173" font-family="Inter, sans-serif" font-size="14" fill="#2196f3">S2</text>
  <text x="88" y="160" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e5e5e5">Staging Server</text>
  <text x="88" y="180" font-family="Inter, sans-serif" font-size="11" fill="#a6a6a6">192.168.1.101 À CentOS 8</text>
  <circle cx="440" cy="168" r="5" fill="#4caf50"/>

  <rect x="24" y="212" width="452" height="64" rx="8" fill="#111"/>
  <circle cx="56" cy="244" r="16" fill="#ff9800" opacity="0.15"/>
  <text x="46" y="249" font-family="Inter, sans-serif" font-size="14" fill="#ff9800">DB</text>
  <text x="88" y="236" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e5e5e5">MySQL Database</text>
  <text x="88" y="256" font-family="Inter, sans-serif" font-size="11" fill="#a6a6a6">192.168.1.102:3306 À MySQL 8.0</text>
  <circle cx="440" cy="244" r="5" fill="#4caf50"/>

  <!-- Stats bar -->
  <rect x="24" y="300" width="452" height="1" fill="#333"/>

  <rect x="24" y="320" width="140" height="56" rx="8" fill="#111"/>
  <text x="40" y="340" font-family="Inter, sans-serif" font-size="10" fill="#a6a6a6">CPU USAGE</text>
  <text x="40" y="362" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#E53935">24%</text>

  <rect x="180" y="320" width="140" height="56" rx="8" fill="#111"/>
  <text x="196" y="340" font-family="Inter, sans-serif" font-size="10" fill="#a6a6a6">MEMORY</text>
  <text x="196" y="362" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#4caf50">4.2 GB</text>

  <rect x="336" y="320" width="140" height="56" rx="8" fill="#111"/>
  <text x="352" y="340" font-family="Inter, sans-serif" font-size="10" fill="#a6a6a6">DISK</text>
  <text x="352" y="362" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#2196f3">67%</text>
