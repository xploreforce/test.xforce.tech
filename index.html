<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta content="X-Force Kit - Server Management Terminal" name="description" />
		<meta
			content="SSH,SFTP,FTP,Database,MySQL,Terminal,Server Management,Remote Connection"
			name="keywords"
		/>
		<link rel="icon" href="/images/fevicon.ico" type="image/x-icon" />
		<title>X-Force Kit</title>
		<script>
			// Restore SPA route from 404.html redirect
			(function (l) {
				if (l.search[1] === '/') {
					var decoded = l.search
						.slice(1)
						.split('&')
						.map(function (s) {
							return s.replace(/~and~/g, '&');
						})
						.join('?');
					window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
				}
			})(window.location);
		</script>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
