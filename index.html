<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta content="X-Force Kit - All-in-one Server Management Terminal. SSH, FTP/SFTP, Database management in a single interface." name="description" />
		<meta content="SSH,SFTP,FTP,Database,MySQL,Terminal,Server Management,Remote Connection,X-Force Kit" name="keywords" />
		<meta content="X-Force Kit — Seamless Connections, Complete Control" property="og:title" />
		<meta content="All-in-one server management terminal for SSH, FTP/SFTP, and database operations." property="og:description" />
		<link rel="icon" href="/images/fevicon.ico" type="image/x-icon" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
		<title>X-Force Kit</title>
		<script>
			(function (l) {
				if (l.search[1] === '/') {
					var decoded = l.search
						.slice(1)
						.split('&')
						.map(function (s) {
							return s.replace(/~and~/g, '&');
						})
						.join('?');
					window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
				}
			})(window.location);
		</script>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
